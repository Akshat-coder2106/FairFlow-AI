publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  http: ^1.2.2
  file_picker: ^8.1.2
  fl_chart: ^0.69.0
  printing: ^5.13.4
  pdf: ^3.11.1
